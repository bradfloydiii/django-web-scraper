services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./server/media:/app/media
    depends_on:
      - db

volumes:
  pgdata:
